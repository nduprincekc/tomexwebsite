<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — TOMEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<a href="index.html" class="back-home">← Back to TOMEX</a>

<main class="auth-page">
  <svg class="auth-bg-tomato tl" viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="90" fill="#e63946"/></svg>
  <svg class="auth-bg-tomato br" viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="90" fill="#e63946"/></svg>

  <form class="auth-card" id="loginForm">
    <h1>Login</h1>
    <input class="field" type="text" placeholder="Username or Email" required autocomplete="username">
    <input class="field" type="password" placeholder="Password" required autocomplete="current-password">
    <a href="#" class="auth-link">Forgot Password?</a>
    <button type="submit" class="btn btn-white btn-block">Login</button>
    <p class="auth-switch">New to TOMEX? <a href="onboarding.html">Create an account</a></p>
  </form>
</main>

<script src="js/script.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    btn.textContent = 'Signing in…';
    setTimeout(() => { window.location.href = 'index.html'; }, 900);
  });
</script>
</body>
</html>
