<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — TOMEX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<a href="index.html" class="back-home">← Back to TOMEX</a>

<main class="auth-page">
  <svg class="auth-bg-tomato tl" viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="90" fill="#e63946"/></svg>
  <svg class="auth-bg-tomato br" viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="90" fill="#e63946"/></svg>

  <form class="auth-card" id="loginForm">
    <h1>Login</h1>
    <input class="field" type="text" placeholder="Username or Email" required autocomplete="username">
    <input class="field" type="password" placeholder="Password" required autocomplete="current-password">
    <a href="#" class="auth-link">Forgot Password?</a>
    <button type="submit" class="btn btn-white btn-block">Login</button>
    <p class="auth-switch">New to TOMEX? <a href="onboarding.html">Create an account</a></p>
  </form>
</main>

<script src="js/script.js"></script>
<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = this.querySelector('button[type="submit"]');
    btn.textContent = 'Signing in…';
    setTimeout(() => { window.location.href = 'index.html'; }, 900);
  });
</script>
<!-- Tomex Bot -->
<link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
<style>
  :root {
    /* primary (TOMEX forest green) */
    --chat--color--primary: #1e4a26;
    --chat--color--primary-shade-50: #173b1e;
    --chat--color--primary--shade-100: #123016;
    --chat--color-primary: #1e4a26;
    --chat--color-primary-shade-50: #173b1e;
    /* secondary (TOMEX red accent) */
    --chat--color--secondary: #e63946;
    --chat--color-secondary-shade-50: #cc2e3a;
    --chat--color-secondary: #e63946;
    /* neutrals */
    --chat--color-white: #ffffff;
    --chat--color-light: #f8f1e6;
    --chat--color-light-shade-50: #f3e6d3;
    --chat--color-light-shade-100: #e2ded4;
    --chat--color-medium: #d2d4d9;
    --chat--color-dark: #1a1a1a;
    --chat--color-disabled: #999999;
    --chat--color-typing: #666666;
    /* layout */
    --chat--spacing: 1rem;
    --chat--border-radius: 14px;
    --chat--transition-duration: 0.15s;
    --chat--window--width: 400px;
    --chat--window--height: 620px;
    --chat--font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    /* toggle button */
    --chat--toggle--background: #1e4a26;
    --chat--toggle--hover--background: #2d6b3f;
    --chat--toggle--active--background: #173b1e;
    --chat--toggle--color: #ffffff;
    --chat--toggle--size: 60px;
    /* header */
    --chat--header--background: #1e4a26;
    --chat--header--color: #ffffff;
    --chat--header--border-top: none;
    /* messages */
    --chat--message--bot--background: #f8f1e6;
    --chat--message--bot--color: #1a1a1a;
    --chat--message--bot--border: none;
    --chat--message--user--background: #1e4a26;
    --chat--message--user--color: #ffffff;
    --chat--message--user--border: none;
    /* send button */
    --chat--input--send--button--background: #1e4a26;
    --chat--input--send--button--color: #ffffff;
  }
</style>
<script type="module">
  import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
  createChat({
    webhookUrl: 'https://kcemma.dedyn.io/webhook/4091fa09-fb9a-4039-9411-7104d213f601/chat',
    mode: 'window',
    chatInputKey: 'chatInput',
    chatSessionKey: 'sessionId',
    loadPreviousSession: true,
    showWelcomeScreen: false,
    defaultLanguage: 'en',
    initialMessages: [
      "👋 Hi, I'm Tomex Bot — your guide to the TOMEX project. Ask me about how it works, pricing, or the team behind it."
    ],
    i18n: {
      en: {
        title: 'Tomex Bot',
        subtitle: 'Ask me anything about TOMEX.',
        footer: '',
        getStarted: 'New Conversation',
        inputPlaceholder: 'Type your question…',
        closeButtonTooltip: 'Close chat',
      },
    },
  });
</script>

</body>
</html>
