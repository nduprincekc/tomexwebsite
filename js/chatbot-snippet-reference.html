<!-- Tomex Bot -->
<link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
<style>
  :root {
    /* primary (TOMEX forest green) */
    --chat--color--primary: #1e4a26;
    --chat--color--primary-shade-50: #173b1e;
    --chat--color--primary--shade-100: #123016;
    --chat--color-primary: #1e4a26;
    --chat--color-primary-shade-50: #173b1e;
    /* secondary (TOMEX red accent) */
    --chat--color--secondary: #e63946;
    --chat--color-secondary-shade-50: #cc2e3a;
    --chat--color-secondary: #e63946;
    /* neutrals */
    --chat--color-white: #ffffff;
    --chat--color-light: #f8f1e6;
    --chat--color-light-shade-50: #f3e6d3;
    --chat--color-light-shade-100: #e2ded4;
    --chat--color-medium: #d2d4d9;
    --chat--color-dark: #1a1a1a;
    --chat--color-disabled: #999999;
    --chat--color-typing: #666666;
    /* layout */
    --chat--spacing: 1rem;
    --chat--border-radius: 14px;
    --chat--transition-duration: 0.15s;
    --chat--window--width: 400px;
    --chat--window--height: 620px;
    --chat--font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    /* toggle button */
    --chat--toggle--background: #1e4a26;
    --chat--toggle--hover--background: #2d6b3f;
    --chat--toggle--active--background: #173b1e;
    --chat--toggle--color: #ffffff;
    --chat--toggle--size: 60px;
    /* header */
    --chat--header--background: #1e4a26;
    --chat--header--color: #ffffff;
    --chat--header--border-top: none;
    /* messages */
    --chat--message--bot--background: #f8f1e6;
    --chat--message--bot--color: #1a1a1a;
    --chat--message--bot--border: none;
    --chat--message--user--background: #1e4a26;
    --chat--message--user--color: #ffffff;
    --chat--message--user--border: none;
    /* send button */
    --chat--input--send--button--background: #1e4a26;
    --chat--input--send--button--color: #ffffff;
  }
</style>
<script type="module">
  import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
  createChat({
    webhookUrl: 'https://kcemma.dedyn.io/webhook/4091fa09-fb9a-4039-9411-7104d213f601/chat',
    mode: 'window',
    chatInputKey: 'chatInput',
    chatSessionKey: 'sessionId',
    loadPreviousSession: true,
    showWelcomeScreen: false,
    defaultLanguage: 'en',
    initialMessages: [
      "👋 Hi, I'm Tomex Bot — your guide to the TOMEX project. Ask me about how it works, pricing, or the team behind it."
    ],
    i18n: {
      en: {
        title: 'Tomex Bot',
        subtitle: 'Ask me anything about TOMEX.',
        footer: '',
        getStarted: 'New Conversation',
        inputPlaceholder: 'Type your question…',
        closeButtonTooltip: 'Close chat',
      },
    },
  });
</script>
